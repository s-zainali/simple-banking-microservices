quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=myuser
quarkus.datasource.password=mypassword
quarkus.http.port=8082
quarkus.rest-client."core-service-api".url=http://localhost:8080
quarkus.rest-client."core-service-api".connect-timeout=3000
quarkus.rest-client."core-service-api".read-timeout=10000

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/mydatabase
quarkus.datasource.jdbc.max-size=16

# The core service OWNS the user_entities schema and seed data.
# This service only reads it for authentication, so never touch the schema.
quarkus.hibernate-orm.database.generation=none

quarkus.security.jpa.password-provider=clear-text
quarkus.http.auth.basic=true
